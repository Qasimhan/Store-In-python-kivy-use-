name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip wget curl \
            build-essential \
            python3-pip \
            libffi-dev libssl-dev \
            autoconf automake libtool pkg-config

      - name: Install Buildozer
        run: |
          python -m pip install --upgrade pip
          python -m pip install buildozer==1.6.0 Cython

      - name: Install Android SDK
        run: |
          mkdir -p $RUNNER_TEMP/android-sdk/cmdline-tools

          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip

          unzip -q commandlinetools-linux-11076708_latest.zip

          mv cmdline-tools $RUNNER_TEMP/android-sdk/cmdline-tools/latest

      - name: Configure Android
        run: |
          export ANDROID_HOME=$RUNNER_TEMP/android-sdk
          export ANDROID_SDK_ROOT=$RUNNER_TEMP/android-sdk

          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_HOME" >> $GITHUB_ENV

          echo "$ANDROID_HOME/platform-tools" >> $GITHUB_PATH
          echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> $GITHUB_PATH

          yes | sdkmanager --licenses

          sdkmanager \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "ndk;25.2.9519653"

      - name: Link SDK for Buildozer
        run: |
          mkdir -p $HOME/.buildozer/android/platform

          ln -sfn \
          $RUNNER_TEMP/android-sdk \
          $HOME/.buildozer/android/platform/android-sdk

          echo "$RUNNER_TEMP/android-sdk/platform-tools" >> $GITHUB_PATH
          echo "$RUNNER_TEMP/android-sdk/build-tools/34.0.0" >> $GITHUB_PATH
          echo "$RUNNER_TEMP/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH

      - name: Verify SDK
        run: |
          which sdkmanager || true
          which aidl || true

          ls -la $HOME/.buildozer/android/platform/android-sdk
          ls -la $HOME/.buildozer/android/platform/android-sdk/build-tools || true
          ls -la $HOME/.buildozer/android/platform/android-sdk/build-tools/34.0.0 || true

      - name: Build APK
        run: |
          buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: APK
          path: bin/*.apk
